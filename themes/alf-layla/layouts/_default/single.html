{{ define "main" }}
<article class="story-single">
	<div class="story-back">
		<a href="/stories/" class="story-back-link">
			<span class="back-arrow">→</span>
			<span>العودة إلى الحكايات</span>
		</a>
	</div>
	<div class="story-frame">
		<div class="story-header">
			<div class="story-ornament">❖ ❖</div>
			<h1 class="story-title">{{ .Title }}</h1>
			<div class="story-ornament">❖ ❖</div>
			{{ with .Params.tags }}
			<div class="story-tags">
				{{ range . }}
				<a href="{{ "/tags/" | relURL }}{{ . | urlize }}/" class="story-tag">{{ . }}</a>
				{{ end }}
			</div>
			{{ end }}
		</div>
		<div class="story-body">
			{{ .Content }}
		</div>
		<div class="story-footer-ornament">
			✦ ✦ ✦
		</div>
	</div>

	<nav class="story-nav">
		{{ with .PrevInSection }}
		<a href="{{ .RelPermalink }}" class="story-nav-link story-nav-prev">
			<span class="nav-arrow">→</span>
			<span class="nav-label">الحكاية السابقة</span>
			<span class="nav-title">{{ .Title }}</span>
		</a>
		{{ end }}
		{{ with .NextInSection }}
		<a href="{{ .RelPermalink }}" class="story-nav-link story-nav-next">
			<span class="nav-arrow">←</span>
			<span class="nav-label">الحكاية التالية</span>
			<span class="nav-title">{{ .Title }}</span>
		</a>
		{{ end }}
	</nav>
</article>
{{ end }}
