<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#162447"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Crescent moon -->
  <circle cx="200" cy="160" r="50" fill="#d4a853" opacity="0.8"/>
  <circle cx="218" cy="150" r="42" fill="#0f1d35"/>
  <!-- Stars -->
  <circle cx="400" cy="100" r="2" fill="white" opacity="0.6"/>
  <circle cx="600" cy="80" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="800" cy="120" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="1000" cy="90" r="2" fill="white" opacity="0.4"/>
  <circle cx="500" cy="150" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="900" cy="180" r="2" fill="white" opacity="0.3"/>
  <!-- Decorative line -->
  <line x1="350" y1="315" x2="850" y2="315" stroke="#d4a853" stroke-width="1" opacity="0.4"/>
  <polygon points="600,308 604,314 610,314 605,318 607,324 600,320 593,324 595,318 590,314 596,314" fill="#d4a853" opacity="0.5"/>
  <!-- Title -->
  <text x="600" y="270" text-anchor="middle" font-family="serif" font-size="90" fill="#d4a853" direction="rtl">جِحَابيديا</text>
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="serif" font-size="32" fill="#f5deb3" opacity="0.7" direction="rtl">موسوعة نوادر جحا</text>
  <!-- English subtitle -->
  <text x="600" y="430" text-anchor="middle" font-family="serif" font-size="24" fill="#f5deb3" opacity="0.4" font-style="italic">The Jeha Encyclopedia</text>
  <!-- Bottom line -->
  <text x="600" y="560" text-anchor="middle" font-family="serif" font-size="20" fill="#d4a853" opacity="0.3">jehapedia.org</text>
</svg>
